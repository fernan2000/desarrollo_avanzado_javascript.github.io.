<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Biblioteca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Sistema de Gestión de Biblioteca</h1>
            <p>Gestión completa de libros con operaciones asíncronas</p>
        </header>

        <!-- Panel de Control -->
        <div class="control-panel">
            <div class="card">
                <h2>📖 Agregar Nuevo Libro</h2>
                <form id="agregarLibroForm">
                    <div class="form-group">
                        <input type="text" id="titulo" placeholder="Título del libro" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="autor" placeholder="Autor" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="genero" placeholder="Género" required>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="disponible" checked> Disponible
                        </label>
                    </div>
                    <button type="submit" class="btn btn-success">➕ Agregar Libro</button>
                </form>
            </div>

            <div class="card">
                <h2>🔍 Buscar Libros</h2>
                <div class="form-group">
                    <select id="criterioBusqueda">
                        <option value="titulo">Por Título</option>
                        <option value="autor">Por Autor</option>
                        <option value="genero">Por Género</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="text" id="valorBusqueda" placeholder="Valor a buscar...">
                </div>
                <button id="buscarBtn" class="btn btn-info">🔎 Buscar</button>
                <button id="resetBusquedaBtn" class="btn btn-secondary">🔄 Mostrar Todos</button>
            </div>
        </div>

        <!-- Lista de Libros -->
        <div class="books-section">
            <div class="section-header">
                <h2>📚 Inventario de Libros</h2>
                <button id="refrescarBtn" class="btn btn-primary">🔄 Refrescar</button>
            </div>
            <div id="listaLibros" class="books-grid">
                <!-- Los libros se cargarán aquí dinámicamente -->
                <div class="loading">Cargando libros...</div>
            </div>
        </div>
    </div>

    <!-- Toast para notificaciones -->
    <div id="toast" class="toast"></div>

    <script src="biblioteca.js"></script>
</body>
</html>
