<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validación con Zod</title>
  <script src="https://cdn.jsdelivr.net/npm/zod@3.21.4/lib/index.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f4f8;
      font-family: Georgia, 'Times New Roman', serif;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border: 2px solid #222;
      border-radius: 4px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 6px 6px 0px #222;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.3rem;
      color: #111;
      letter-spacing: -0.5px;
    }

    .subtitulo {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 1.8rem;
      font-family: 'Courier New', monospace;
    }

    .campo { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: 'Courier New', monospace;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 2px solid #ccc;
      border-radius: 3px;
      font-size: 0.95rem;
      font-family: Georgia, serif;
      color: #111;
      background: #fafafa;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    input:focus { border-color: #222; background: #fff; }
    input.error { border-color: #c0392b; background: #fff5f5; }
    input.valido { border-color: #27ae60; background: #f5fff8; }

    .msg-error {
      font-size: 0.78rem;
      color: #c0392b;
      margin-top: 0.3rem;
      font-family: 'Courier New', monospace;
      min-height: 1rem;
      display: none;
    }

    .msg-error.visible { display: block; }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.8rem;
      background: #111;
      color: #fff;
      border: 2px solid #111;
      border-radius: 3px;
      font-size: 0.95rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover { background: #fff; color: #111; }
    button[type="submit"]:active { transform: scale(0.98); }

    .exito {
      display: none;
      background: #eafaf1;
      border: 2px solid #27ae60;
      border-radius: 3px;
      padding: 0.8rem 1rem;
      color: #1e8449;
      font-family: 'Courier New', monospace;
      font-size: 0.88rem;
      margin-top: 1rem;
      text-align: center;
    }

    .exito.visible { display: block; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Registro de Usuario</h1>
    <p class="subtitulo">Completa los campos para crear tu cuenta</p>

    <form id="registerForm" novalidate>

      <div class="campo">
        <label for="name">Nombre</label>
        <input type="text" id="name" placeholder="Tu nombre completo" />
        <p class="msg-error" id="error-name"></p>
      </div>

      <div class="campo">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="tucorreo@ejemplo.com" />
        <p class="msg-error" id="error-email"></p>
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
        <p class="msg-error" id="error-password"></p>
      </div>

      <button type="submit">Registrar</button>
    </form>

    <p class="exito" id="mensajeExito">✅ ¡Registro exitoso! Bienvenido/a.</p>
  </div>

  <script>
    const { z } = window.Zod;

    const registerSchema = z.object({
      name: z.string().min(1, { message: "El nombre es obligatorio" }),
      email: z.string().email({ message: "Por favor ingresa un correo válido" }),
      password: z.string().min(6, { message: "La contraseña debe tener al menos 6 caracteres" }),
    });

    const form = document.getElementById("registerForm");
    const mensajeExito = document.getElementById("mensajeExito");
    const campos = ["name", "email", "password"];

    function limpiarCampo(id) {
      const input = document.getElementById(id);
      const errorEl = document.getElementById("error-" + id);
      input.classList.remove("error", "valido");
      errorEl.textContent = "";
      errorEl.classList.remove("visible");
    }

    function mostrarError(id, mensaje) {
      const input = document.getElementById(id);
      const errorEl = document.getElementById("error-" + id);
      input.classList.add("error");
      input.classList.remove("valido");
      errorEl.textContent = mensaje;
      errorEl.classList.add("visible");
    }

    function marcarValido(id) {
      const input = document.getElementById(id);
      const errorEl = document.getElementById("error-" + id);
      input.classList.add("valido");
      input.classList.remove("error");
      errorEl.textContent = "";
      errorEl.classList.remove("visible");
    }

    campos.forEach((id) => {
      const input = document.getElementById(id);
      input.addEventListener("input", () => {
        const campoSchema = registerSchema.shape[id];
        const resultado = campoSchema.safeParse(input.value);
        if (!resultado.success) {
          mostrarError(id, resultado.error.errors[0].message);
        } else {
          marcarValido(id);
        }
      });
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      mensajeExito.classList.remove("visible");

      const formData = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
      };

      campos.forEach(limpiarCampo);

      try {
        registerSchema.parse(formData);
        mensajeExito.classList.add("visible");
        form.reset();
        campos.forEach(limpiarCampo);
      } catch (error) {
        error.errors.forEach((e) => {
          mostrarError(e.path[0], e.message);
        });
      }
    });
  </script>

</body>
</html>
